<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna — Monthly Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3250;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #eab308;
      --orange:   #f97316;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --radius:   12px;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.5px; }
    header h1 span { color: var(--accent2); }

    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .sync-badge {
      font-size: .72rem; padding: 4px 10px; border-radius: 99px; font-weight: 600;
      transition: all .3s;
    }
    .sync-badge.synced  { background: rgba(34,197,94,.15);  color: var(--green); }
    .sync-badge.syncing { background: rgba(108,99,255,.15); color: var(--accent2); }
    .sync-badge.error   { background: rgba(239,68,68,.15);  color: var(--red); }

    .month-nav {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 14px;
    }
    .month-nav button {
      background: none; border: none; color: var(--accent2); font-size: 1.1rem;
      cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: background .15s;
    }
    .month-nav button:hover { background: var(--surface2); }
    .month-nav span { font-weight: 600; min-width: 130px; text-align: center; }

    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .card .value { font-size: 1.7rem; font-weight: 700; }
    .card .sub   { font-size: .8rem; color: var(--muted); margin-top: 4px; }
    .card.income .value { color: var(--green); }
    .card.spent  .value { color: var(--orange); }
    .card.left.negative .value { color: var(--red); }
    .progress-wrap { margin-top: 12px; }
    .progress-bar  { height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .4s; }

    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
    @media (max-width: 820px) { .main-grid { grid-template-columns: 1fr; } }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-header h2 { font-size: 1rem; font-weight: 600; }

    .btn { border: none; cursor: pointer; border-radius: 8px; font-size: .85rem; font-weight: 600; padding: 7px 14px; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; font-size: .8rem; padding: 4px 8px; }
    .btn-danger:hover { border-color: var(--red); }

    .category-block { margin-bottom: 16px; }
    .category-title {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
      padding: 6px 4px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
      display: flex; justify-content: space-between;
    }
    .category-total { color: var(--text); font-weight: 600; }

    .expense-row {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; transition: background .12s;
    }
    .expense-row:hover { background: var(--surface2); }
    .expense-name   { font-size: .9rem; }
    .expense-note   { font-size: .72rem; color: var(--muted); }
    .expense-amount { font-weight: 600; font-size: .9rem; text-align: right; white-space: nowrap; }

    .right-panel { display: flex; flex-direction: column; gap: 20px; }

    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-wrap h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .donut-container { position: relative; width: 180px; margin: 0 auto 16px; }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .donut-center .dc-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; }
    .donut-center .dc-value { font-size: 1.2rem; font-weight: 700; }
    .legend { display: flex; flex-direction: column; gap: 8px; }
    .legend-row { display: flex; align-items: center; gap: 10px; font-size: .82rem; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { flex: 1; color: var(--muted); }
    .legend-val  { font-weight: 600; }
    .legend-pct  { color: var(--muted); font-size: .75rem; min-width: 36px; text-align: right; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .form-group input,
    .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: .9rem; outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    .salary-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .salary-row:hover .edit-icon { opacity: 1; }
    .edit-icon { opacity: 0; font-size: .85rem; color: var(--accent2); transition: opacity .15s; }

    .toast {
      position: fixed; bottom: 28px; right: 24px; color: #fff;
      padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: .85rem;
      z-index: 200; animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

/* ── Supabase client ── */
const sb = createClient(
  'https://oxjypyxpautowgomqlrm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94anlweXhwYXV0b3dnb21xbHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzY5NDEsImV4cCI6MjA5NjAxMjk0MX0.0zh0qw9F_TIuZlPncc9tMBa81A7hJaq_E2ZXBwZQJ9s'
);

/* ── Constants ── */
const CATEGORY_COLORS = [
  '#6c63ff','#a78bfa','#22c55e','#eab308','#f97316',
  '#ef4444','#06b6d4','#ec4899','#84cc16','#f59e0b'
];
const CATEGORIES = [
  'Housing','Utilities','Insurance','Health','Personal Care',
  'Groceries','Leisure','Installments','Transport','Other'
];
const MONTH_NAMES = [
  'January','February','March','April','May','June',
  'July','August','September','October','November','December'
];

/* ── State ── */
const now = new Date();
let state = {
  salary: 3183.13,
  currentYear:  now.getFullYear(),
  currentMonth: now.getMonth(),
  expenses: [],
  loans: [],
  monthlyOverrides: {},
};
let syncStatus = 'syncing';

/* ── Local cache ── */
function saveLocal() {
  localStorage.setItem('anna_v3', JSON.stringify(state));
}
function loadLocal() {
  try { const r = localStorage.getItem('anna_v3'); return r ? JSON.parse(r) : null; } catch { return null; }
}

/* ── Sync badge ── */
function setSyncStatus(s) {
  syncStatus = s;
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  badge.className = 'sync-badge ' + s;
  const labels = { synced: '● Synced', syncing: '↻ Syncing…', error: '✕ Offline' };
  badge.textContent = labels[s] || s;
}

async function withSync(fn) {
  setSyncStatus('syncing');
  try { await fn(); setSyncStatus('synced'); }
  catch(e) { console.error(e); setSyncStatus('error'); showToast('Saved locally — sync failed', '#f97316'); }
}

/* ── Supabase fetch ── */
async function fetchRemote() {
  const [expRes, settRes, loanRes, ovRes] = await Promise.all([
    sb.from('anna_expenses').select('*').order('id'),
    sb.from('anna_settings').select('*').eq('id', 1).single(),
    sb.from('anna_loans').select('*').order('id'),
    sb.from('anna_monthly_overrides').select('*'),
  ]);

  if (expRes.error) throw expRes.error;

  const monthlyOverrides = {};
  (ovRes.data || []).forEach(o => {
    const key = `${o.year}-${o.month}`;
    if (!monthlyOverrides[key]) monthlyOverrides[key] = [];
    monthlyOverrides[key].push({ id: o.expense_id, amount: o.amount });
  });

  return {
    salary: settRes.data?.salary ?? 3183.13,
    expenses: expRes.data || [],
    loans: loanRes.data || [],
    monthlyOverrides,
  };
}

/* ── Helpers ── */
const fmt = n => '€' + Number(n).toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const monthKey = () => `${state.currentYear}-${state.currentMonth}`;

function getMonthExpenses() {
  const overrides = state.monthlyOverrides[monthKey()] || [];
  return state.expenses.map(e => {
    const ov = overrides.find(o => o.id === e.id);
    return ov ? { ...e, amount: ov.amount } : { ...e };
  });
}

function getCategories(expenses) {
  const map = {};
  expenses.forEach(e => { if (!map[e.category]) map[e.category] = []; map[e.category].push(e); });
  return map;
}

/* ── Render ── */
const root = document.getElementById('root');
let toastTimer = null;

function showToast(msg, color = '#22c55e') {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = color;
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 2800);
}

function render() {
  const expenses   = getMonthExpenses();
  const catMap     = getCategories(expenses);
  const expTotal   = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const loanTotal  = state.loans.reduce((s, l) => s + Number(l.monthly), 0);
  const grandTotal = expTotal + loanTotal;
  const left       = state.salary - grandTotal;
  const pct        = Math.min(100, Math.round((grandTotal / state.salary) * 100));
  const monthLabel = MONTH_NAMES[state.currentMonth] + ' ' + state.currentYear;

  const catTotals = Object.entries(catMap).map(([cat, items]) => ({
    cat, total: items.reduce((s, i) => s + Number(i.amount), 0)
  }));
  catTotals.push({ cat: 'Loans', total: loanTotal });
  catTotals.sort((a, b) => b.total - a.total);

  const fillColor = pct > 100 ? 'var(--red)' : pct > 85 ? 'var(--orange)' : 'var(--green)';

  root.innerHTML = `
  <div class="app">
    <header>
      <h1>Anna <span>Expense Tracker</span></h1>
      <div class="header-right">
        <span id="sync-badge" class="sync-badge ${syncStatus}">
          ${syncStatus === 'synced' ? '● Synced' : syncStatus === 'error' ? '✕ Offline' : '↻ Syncing…'}
        </span>
        <div class="month-nav">
          <button id="prevMonth">&#8249;</button>
          <span>${monthLabel}</span>
          <button id="nextMonth">&#8250;</button>
        </div>
      </div>
    </header>

    <div class="summary-grid">
      <div class="card income">
        <div class="label">Net Salary</div>
        <div class="salary-row" id="editSalaryBtn">
          <div class="value">${fmt(state.salary)}</div>
          <span class="edit-icon">✏️</span>
        </div>
        <div class="sub">Monthly take-home</div>
      </div>
      <div class="card spent">
        <div class="label">Total Expenses</div>
        <div class="value">${fmt(grandTotal)}</div>
        <div class="sub">incl. ${fmt(loanTotal)} loans</div>
      </div>
      <div class="card left ${left < 0 ? 'negative' : ''}">
        <div class="label">Remaining</div>
        <div class="value">${fmt(left)}</div>
        <div class="sub">${pct}% of salary spent</div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="section-header">
          <h2>Expenses</h2>
          <button class="btn btn-primary" id="addExpenseBtn">+ Add Expense</button>
        </div>

        ${Object.entries(catMap).map(([cat, items]) => {
          const catTotal = items.reduce((s, i) => s + Number(i.amount), 0);
          return `
          <div class="category-block">
            <div class="category-title">
              <span>${cat}</span>
              <span class="category-total">${fmt(catTotal)}</span>
            </div>
            ${items.map(e => `
            <div class="expense-row">
              <div>
                <div class="expense-name">${e.name}</div>
                ${e.note ? `<div class="expense-note">${e.note}</div>` : ''}
              </div>
              <div class="expense-amount">${fmt(e.amount)}</div>
              <div style="display:flex;gap:4px">
                <button class="btn btn-ghost" style="font-size:.75rem;padding:4px 8px" data-edit="${e.id}">Edit</button>
                <button class="btn btn-danger" data-delete="${e.id}">✕</button>
              </div>
            </div>`).join('')}
          </div>`;
        }).join('')}

        <div class="category-block">
          <div class="category-title">
            <span>Loans (monthly installments)</span>
            <span class="category-total">${fmt(loanTotal)}</span>
          </div>
          ${state.loans.map(l => `
          <div class="expense-row">
            <div><div class="expense-name">${l.name}</div></div>
            <div class="expense-amount">${fmt(l.monthly)}</div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost" style="font-size:.75rem;padding:4px 8px" data-edit-loan="${l.id}">Edit</button>
              <button class="btn btn-danger" data-delete-loan="${l.id}">✕</button>
            </div>
          </div>`).join('')}
          <div style="margin-top:10px">
            <button class="btn btn-ghost" id="addLoanBtn" style="width:100%">+ Add Loan</button>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="chart-wrap">
          <h2>Breakdown</h2>
          <div class="donut-container">
            ${buildDonut(catTotals, grandTotal)}
            <div class="donut-center">
              <span class="dc-label">Total</span>
              <span class="dc-value">${fmt(grandTotal)}</span>
            </div>
          </div>
          <div class="legend">
            ${catTotals.map((c, i) => `
            <div class="legend-row">
              <div class="legend-dot" style="background:${CATEGORY_COLORS[i % CATEGORY_COLORS.length]}"></div>
              <span class="legend-name">${c.cat}</span>
              <span class="legend-val">${fmt(c.total)}</span>
              <span class="legend-pct">${grandTotal ? Math.round((c.total/grandTotal)*100) : 0}%</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;

  bindEvents();
}

function buildDonut(catTotals, total) {
  if (total === 0) return '<svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.9" fill="none" stroke="#2e3250" stroke-width="3.5"/></svg>';
  const r = 15.9, circ = 2 * Math.PI * r;
  let offset = 0;
  const segs = catTotals.map((c, i) => {
    const pct = c.total / total;
    const dash = pct * circ, gap = circ - dash;
    const seg = `<circle cx="18" cy="18" r="${r}" fill="none"
      stroke="${CATEGORY_COLORS[i % CATEGORY_COLORS.length]}" stroke-width="3.5"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 18 18)"/>`;
    offset += dash;
    return seg;
  });
  return `<svg viewBox="0 0 36 36" style="width:100%;height:auto">${segs.join('')}</svg>`;
}

/* ── Events ── */
function bindEvents() {
  document.getElementById('prevMonth')?.addEventListener('click', () => {
    state.currentMonth--;
    if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
    saveLocal(); render();
  });
  document.getElementById('nextMonth')?.addEventListener('click', () => {
    state.currentMonth++;
    if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
    saveLocal(); render();
  });

  document.getElementById('addExpenseBtn')?.addEventListener('click', () => openExpenseModal());
  document.getElementById('addLoanBtn')?.addEventListener('click',    () => openLoanModal());
  document.getElementById('editSalaryBtn')?.addEventListener('click', openSalaryModal);

  document.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.edit);
      const e  = getMonthExpenses().find(x => x.id === id);
      if (e) openExpenseModal(e);
    });
  });
  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.delete);
      if (!confirm('Remove this expense?')) return;
      state.expenses = state.expenses.filter(e => e.id !== id);
      Object.keys(state.monthlyOverrides).forEach(k => {
        state.monthlyOverrides[k] = state.monthlyOverrides[k].filter(o => o.id !== id);
      });
      saveLocal(); render();
      showToast('Expense removed', '#ef4444');
      withSync(() => sb.from('anna_expenses').delete().eq('id', id));
    });
  });
  document.querySelectorAll('[data-edit-loan]').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = state.loans.find(x => x.id === btn.dataset.editLoan);
      if (l) openLoanModal(l);
    });
  });
  document.querySelectorAll('[data-delete-loan]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.deleteLoan;
      if (!confirm('Remove this loan?')) return;
      state.loans = state.loans.filter(l => l.id !== id);
      saveLocal(); render();
      showToast('Loan removed', '#ef4444');
      withSync(() => sb.from('anna_loans').delete().eq('id', id));
    });
  });
}

/* ── Modals ── */
function openExpenseModal(expense = null) {
  const isEdit = !!expense;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? 'Edit Expense' : 'Add Expense'}</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input id="m-name" type="text" value="${isEdit ? expense.name : ''}" placeholder="e.g. Netflix" />
        </div>
        <div class="form-group">
          <label>Amount (€)</label>
          <input id="m-amount" type="number" step="0.01" min="0" value="${isEdit ? expense.amount : ''}" placeholder="0.00" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="m-cat">
            ${CATEGORIES.map(c => `<option value="${c}" ${isEdit && expense.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <input id="m-note" type="text" value="${isEdit ? (expense.note||'') : ''}" placeholder="Details…" />
        </div>
      </div>
      ${isEdit ? `
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="m-thismonth" />
          Override amount for <strong>${MONTH_NAMES[state.currentMonth]}</strong> only
        </label>
      </div>` : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">${isEdit ? 'Save' : 'Add'}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.querySelector('#m-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#m-save').addEventListener('click', async () => {
    const name   = overlay.querySelector('#m-name').value.trim();
    const amount = parseFloat(overlay.querySelector('#m-amount').value);
    const cat    = overlay.querySelector('#m-cat').value;
    const note   = overlay.querySelector('#m-note').value.trim();
    const monthOnly = isEdit && overlay.querySelector('#m-thismonth')?.checked;

    if (!name || isNaN(amount) || amount < 0) { alert('Please enter a valid name and amount.'); return; }

    const saveBtn = overlay.querySelector('#m-save');
    saveBtn.disabled = true;
    saveBtn.textContent = '…';

    if (isEdit) {
      if (monthOnly) {
        const key = monthKey();
        if (!state.monthlyOverrides[key]) state.monthlyOverrides[key] = [];
        const ov = state.monthlyOverrides[key].find(o => o.id === expense.id);
        if (ov) ov.amount = amount; else state.monthlyOverrides[key].push({ id: expense.id, amount });
        const base = state.expenses.find(e => e.id === expense.id);
        if (base) { base.name = name; base.category = cat; base.note = note; }
        saveLocal(); overlay.remove(); render();
        showToast('Updated for this month');
        withSync(async () => {
          await sb.from('anna_expenses').update({ name, category: cat, note }).eq('id', expense.id);
          await sb.from('anna_monthly_overrides').upsert(
            { expense_id: expense.id, year: state.currentYear, month: state.currentMonth, amount },
            { onConflict: 'expense_id,year,month' }
          );
        });
      } else {
        const base = state.expenses.find(e => e.id === expense.id);
        if (base) { base.name = name; base.amount = amount; base.category = cat; base.note = note; }
        saveLocal(); overlay.remove(); render();
        showToast('Expense updated');
        withSync(() => sb.from('anna_expenses').update({ name, amount, category: cat, note }).eq('id', expense.id));
      }
    } else {
      try {
        setSyncStatus('syncing');
        const { data, error } = await sb.from('anna_expenses')
          .insert({ name, category: cat, amount, note, recurring: true })
          .select().single();
        if (error) throw error;
        state.expenses.push(data);
        saveLocal(); overlay.remove(); render();
        showToast('Expense added');
        setSyncStatus('synced');
      } catch(e) {
        console.error(e);
        setSyncStatus('error');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Add';
        showToast('Could not save — check connection', '#ef4444');
      }
    }
  });

  overlay.querySelector('#m-name')?.focus();
}

function openLoanModal(loan = null) {
  const isEdit = !!loan;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? 'Edit Loan' : 'Add Loan'}</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Loan Name</label>
          <input id="l-name" type="text" value="${isEdit ? loan.name : ''}" placeholder="e.g. Car Loan" />
        </div>
        <div class="form-group">
          <label>Monthly Installment (€)</label>
          <input id="l-amount" type="number" step="0.01" min="0" value="${isEdit ? loan.monthly : ''}" placeholder="0.00" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="l-cancel">Cancel</button>
        <button class="btn btn-primary" id="l-save">${isEdit ? 'Save' : 'Add'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#l-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#l-save').addEventListener('click', async () => {
    const name   = overlay.querySelector('#l-name').value.trim();
    const monthly = parseFloat(overlay.querySelector('#l-amount').value);
    if (!name || isNaN(monthly) || monthly < 0) { alert('Please enter a valid name and amount.'); return; }

    const saveBtn = overlay.querySelector('#l-save');
    saveBtn.disabled = true; saveBtn.textContent = '…';

    if (isEdit) {
      const l = state.loans.find(x => x.id === loan.id);
      if (l) { l.name = name; l.monthly = monthly; }
      saveLocal(); overlay.remove(); render();
      showToast('Loan updated');
      withSync(() => sb.from('anna_loans').update({ name, monthly }).eq('id', loan.id));
    } else {
      const id = 'L' + Date.now();
      try {
        setSyncStatus('syncing');
        const { error } = await sb.from('anna_loans').insert({ id, name, monthly });
        if (error) throw error;
        state.loans.push({ id, name, monthly });
        saveLocal(); overlay.remove(); render();
        showToast('Loan added');
        setSyncStatus('synced');
      } catch(e) {
        console.error(e);
        setSyncStatus('error');
        saveBtn.disabled = false; saveBtn.textContent = 'Add';
        showToast('Could not save — check connection', '#ef4444');
      }
    }
  });
}

function openSalaryModal() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Edit Net Salary</h3>
      <div class="form-group">
        <label>Monthly Net Salary (€)</label>
        <input id="s-amount" type="number" step="0.01" min="0" value="${state.salary}" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="s-cancel">Cancel</button>
        <button class="btn btn-primary" id="s-save">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#s-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#s-save').addEventListener('click', () => {
    const val = parseFloat(overlay.querySelector('#s-amount').value);
    if (isNaN(val) || val < 0) { alert('Enter a valid amount.'); return; }
    state.salary = val;
    saveLocal(); overlay.remove(); render();
    showToast('Salary updated');
    withSync(() => sb.from('anna_settings').upsert({ id: 1, salary: val }));
  });
  overlay.querySelector('#s-amount').select();
}

/* ── Boot ── */
async function init() {
  // Render from cache instantly
  const cached = loadLocal();
  if (cached?.expenses?.length) {
    state = {
      ...cached,
      currentYear:  now.getFullYear(),
      currentMonth: now.getMonth(),
    };
    render();
  }

  // Fetch live data from Supabase
  try {
    const remote = await fetchRemote();
    state = {
      ...state,
      salary:           remote.salary,
      expenses:         remote.expenses,
      loans:            remote.loans,
      monthlyOverrides: remote.monthlyOverrides,
    };
    saveLocal();
    setSyncStatus('synced');
  } catch(e) {
    console.error('Supabase init failed:', e);
    setSyncStatus('error');
    showToast('Could not reach database — using local data', '#f97316');
  }

  render();
}

init();
</script>
