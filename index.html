  <script>
  // Generate icon via Canvas — runs before anything else
  (function () {
    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    function makeIcon(size) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const S = size;

      // ── Background: deep indigo → violet gradient ──
      const bg = ctx.createLinearGradient(0, 0, S, S);
      bg.addColorStop(0, '#3730a3');
      bg.addColorStop(1, '#7c3aed');
      roundedRect(ctx, 0, 0, S, S, S * 0.22);
      ctx.fillStyle = bg;
      ctx.fill();

      // ── Soft glow behind euro sign ──
      const glow = ctx.createRadialGradient(S * .5, S * .43, 0, S * .5, S * .43, S * .38);
      glow.addColorStop(0, 'rgba(255,255,255,0.18)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(S * .5, S * .43, S * .38, 0, Math.PI * 2);
      ctx.fill();

      // ── Euro symbol ──
      ctx.shadowColor  = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur   = S * 0.06;
      ctx.shadowOffsetY = S * 0.02;
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${Math.round(S * .54)}px Arial, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('€', S * .5, S * .43);
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      // ── Mini bar chart ──
      const bars  = [
        { h: S * .13, color: '#4ade80' },
        { h: S * .09, color: '#a78bfa' },
        { h: S * .06, color: '#f97316' },
        { h: S * .04, color: '#f87171' },
      ];
      const bw     = S * 0.10;
      const gap    = S * 0.035;
      const totalW = bars.length * bw + (bars.length - 1) * gap;
      const baseY  = S * 0.72;
      let bx = (S - totalW) / 2;

      bars.forEach(({ h, color }) => {
        roundedRect(ctx, bx, baseY - h, bw, h, bw * 0.28);
        ctx.fillStyle = color;
        ctx.fill();
        bx += bw + gap;
      });

      // ── "ANNA" label — bold, prominent, pill background ──
      const labelY  = S * 0.875;
      const labelH  = S * 0.155;
      roundedRect(ctx, S * 0.12, labelY - labelH * 0.68, S * 0.76, labelH, labelH * 0.5);
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font      = `800 ${Math.round(S * .155)}px Arial, sans-serif`;
      ctx.letterSpacing = `${S * 0.012}px`;
      ctx.fillText('ANNA', S * .5, labelY);

      return c.toDataURL('image/png');
    }

    function setup() {
      const icon180 = makeIcon(180);
      const icon192 = makeIcon(192);
      const icon512 = makeIcon(512);

      // Favicon
      const fav  = document.createElement('link');
      fav.rel    = 'icon';
      fav.type   = 'image/png';
      fav.href   = makeIcon(32);
      document.head.appendChild(fav);

      // Apple touch icon (used by iPhone / Safari Mac Add to Home Screen)
      const ati  = document.createElement('link');
      ati.rel    = 'apple-touch-icon';
      ati.sizes  = '180x180';
      ati.href   = icon180;
      document.head.appendChild(ati);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setup);
    } else {
      setup();
    }
  })();

      padding: 6px 12px; font-size: .78rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: opacity .15s;
    }
    .install-btn:hover { opacity: .88; }
    .install-btn.visible { display: flex; }

    /* theme toggle button */
    .theme-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 10px;
      cursor: pointer; font-size: 1rem; line-height: 1;
      transition: border-color .15s, background .2s;

    .theme-btn:hover { border-color: var(--accent2); }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 1120px; margin: 0 auto; padding: 24px 16px 60px; }

    .sync-badge.error   { background: rgba(239,68,68,.15);  color: var(--red); }

    .btn-danger:hover { border-color: var(--red); background: rgba(239,68,68,.07); }

    .category-block {

      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);

    .category-title {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); padding: 10px 14px 10px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);

    .category-total { color: var(--text); font-weight: 700; font-size: .78rem; }

      align-items: center; gap: 12px;
      padding: 11px 14px;

    .expense-row:last-child { border-bottom: none; }

    .cat-icon { width: 40px; height: 40px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
    .expense-info { min-width: 0; }
    .expense-name   { font-size: .88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }

      border: 1px solid #2e3250; background: #1a1d27;

    .key-btn.empty  { background: transparent; border: none; cursor: default; }
    .key-btn.del    { font-size: 1.1rem; }

/* ── Theme ── */
function applyTheme(t) {

/* ── State ── */
const today = new Date();
let state = {
  salary:       0,
  currentYear:  today.getFullYear(),
  currentMonth: today.getMonth(),
  activeTab:    'monthly',   // 'monthly' | 'year'
  expenses:     [],          // current month only
  loans:        [],          // recurring every month
  yearData:     null,        // { monthTotals: number[12] } – year overview cache
  syncStatus:   'syncing',
};

/* ── Local cache ── */
function saveLocal() {
  const { yearData, ...rest } = state;
  localStorage.setItem('anna_v4', JSON.stringify(rest));
}
function loadLocal() {
  try { const r = localStorage.getItem('anna_v4'); return r ? JSON.parse(r) : null; } catch { return null; }
}

/* ── Helpers ── */
const fmt      = n => '€' + Number(n).toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const loanSum  = () => state.loans.reduce((s, l) => s + Number(l.monthly), 0);

/* ── Sync badge ── */
function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + s;
  el.textContent = { synced: '● Synced', syncing: '↻ Syncing…', error: '✕ Offline' }[s] || s;
}

async function withSync(fn) {
  setSyncStatus('syncing');
  try { await fn(); setSyncStatus('synced'); }
  catch(e) { console.error(e); setSyncStatus('error'); showToast('Saved locally — sync failed', '#f97316'); }
}

/* ── Supabase fetchers ── */
async function fetchMonth(year, month) {
  const [expRes, settRes, loanRes] = await Promise.all([
    sb.from('anna_expenses').select('*').eq('year', year).eq('month', month).order('id'),
    sb.from('anna_settings').select('salary').eq('year', year).eq('month', month).maybeSingle(),
    sb.from('anna_loans').select('*').eq('year', year).eq('month', month).order('id'),
  ]);
  if (expRes.error) throw expRes.error;
  return {
    salary:   settRes.data?.salary ?? 0,
    expenses: expRes.data || [],
    loans:    loanRes.data || [],
  };
}

async function fetchYearData(year) {
  const [expRes, loanRes, settRes] = await Promise.all([
    sb.from('anna_expenses').select('month, amount').eq('year', year),
    sb.from('anna_loans').select('month, monthly').eq('year', year),
    sb.from('anna_settings').select('month, salary').eq('year', year),
  ]);
  const expTotals  = Array(12).fill(0);
  const loanTotals = Array(12).fill(0);
  const salaries   = Array(12).fill(0);
  (expRes.data  || []).forEach(e => { expTotals[e.month]  += Number(e.amount); });
  (loanRes.data || []).forEach(l => { loanTotals[l.month] += Number(l.monthly); });
  (settRes.data || []).forEach(s => { salaries[s.month]    = Number(s.salary); });
  return { expTotals, loanTotals, salaries };
}

/* ── Copy from previous month ── */
async function copyFromPrevious() {
  let pYear = state.currentYear, pMonth = state.currentMonth - 1;
  if (pMonth < 0) { pMonth = 11; pYear--; }
  setSyncStatus('syncing');
  try {
    const [expRes, loanRes, settRes] = await Promise.all([
      sb.from('anna_expenses').select('*').eq('year', pYear).eq('month', pMonth),
      sb.from('anna_loans').select('*').eq('year', pYear).eq('month', pMonth),
      sb.from('anna_settings').select('salary').eq('year', pYear).eq('month', pMonth).maybeSingle(),
    ]);
    const Y = state.currentYear, M = state.currentMonth;
    let count = 0;

    if (expRes.data?.length) {
      const rows = expRes.data.map(({ id, created_at, ...r }) => ({ ...r, year: Y, month: M }));
      const { data: ins } = await sb.from('anna_expenses').insert(rows).select();
      if (ins) { state.expenses = [...state.expenses, ...ins]; count += ins.length; }
    }
    if (loanRes.data?.length) {
      const rows = loanRes.data.map(({ id, created_at, ...r }) => ({ ...r, year: Y, month: M }));
      const { data: ins } = await sb.from('anna_loans').insert(rows).select();
      if (ins) { state.loans = [...state.loans, ...ins]; count += ins.length; }
    }
    if (settRes.data?.salary) {
      state.salary = Number(settRes.data.salary);
      await sb.from('anna_settings').upsert({ year: Y, month: M, salary: state.salary });
    }

    if (count === 0 && !settRes.data?.salary) {
      showToast(`Nothing to copy from ${MONTHS[pMonth]}`, '#f97316');
    } else {
      showToast(`Copied from ${MONTHS[pMonth]}`);
    }
    saveLocal(); render();
    setSyncStatus('synced');
  } catch(e) { console.error(e); setSyncStatus('error'); showToast('Copy failed', '#ef4444'); }
}

}

  <div class="app">
    ${renderHeader()}
    ${renderTabs()}

      <div class="year-card">
        <h2>Monthly Expenses</h2>

            const total     = yd.expTotals[i] + yd.loanTotals[i];

/* ── Donut ── */
function buildDonut(catTotals, total) {
  const r = 15.9, circ = 2 * Math.PI * r;
  let offset = 0;
  const segs = catTotals.map((c, i) => {
    const dash = (c.total / total) * circ, gap = circ - dash;
    const seg = `<circle cx="18" cy="18" r="${r}" fill="none"
      stroke="${COLORS[i % COLORS.length]}" stroke-width="3.5"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 18 18)"/>`;
    offset += dash;
    return seg;
  });
  return `<svg viewBox="0 0 36 36" style="width:100%;height:auto">${segs.join('')}</svg>`;
}

/* ── Event binding ── */
function bindEvents() {
  /* install */
  document.getElementById('install-btn')?.addEventListener('click', async () => {
    if (window._installPrompt) {
      window._installPrompt.prompt();
      const { outcome } = await window._installPrompt.userChoice;
      if (outcome === 'accepted') {
        window._installReady = false;
        window._installPrompt = null;
        document.getElementById('install-btn')?.classList.remove('visible');
      }
    }
  });

  /* theme toggle */
  document.getElementById('theme-btn')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = cur === 'dark' ? '🌙' : '☀️';
  });

  /* tabs */
  document.getElementById('tabMonthly')?.addEventListener('click', () => {
    state.activeTab = 'monthly'; render();
  });
  document.getElementById('tabYear')?.addEventListener('click', async () => {
    state.activeTab = 'year';
    render();
    if (!state.yearData) await refreshYearData();
  });

  /* month nav */
  document.getElementById('prevMonth')?.addEventListener('click', async () => {
    state.currentMonth--;
    if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
    state.expenses = [];
    render();
    await refreshMonth();
  });
  document.getElementById('nextMonth')?.addEventListener('click', async () => {
    state.currentMonth++;
    if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
    state.expenses = [];
    render();
    await refreshMonth();
  });

  /* year nav */
  document.getElementById('prevYear')?.addEventListener('click', async () => {
    state.currentYear--;
    state.yearData = null;
    render();
    await refreshYearData();
  });
  document.getElementById('nextYear')?.addEventListener('click', async () => {
    state.currentYear++;
    state.yearData = null;
    render();
    await refreshYearData();
  });

  /* click month in year view → go to monthly tab for that month */
  document.querySelectorAll('[data-goto-month]').forEach(el => {
    el.addEventListener('click', async () => {
      state.currentMonth = parseInt(el.dataset.gotoMonth);
      state.activeTab = 'monthly';
      state.expenses = [];
      render();
      await refreshMonth();
    });
  });

  /* salary */
  document.getElementById('editSalaryBtn')?.addEventListener('click', openSalaryModal);

  /* copy prev */
  document.getElementById('copyPrevBtn')?.addEventListener('click', copyFromPrevious);

  /* expense actions */
  document.getElementById('addExpenseBtn')?.addEventListener('click', () => openExpenseModal());
  document.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const e = state.expenses.find(x => x.id === parseInt(btn.dataset.edit));
      if (e) openExpenseModal(e);
    });
  });
  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.delete);
      if (!confirm('Remove this expense?')) return;
      state.expenses = state.expenses.filter(e => e.id !== id);
      saveLocal(); render();
      showToast('Removed', '#ef4444');
      withSync(() => sb.from('anna_expenses').delete().eq('id', id));
    });
  });

  /* loan actions */
  document.getElementById('addLoanBtn')?.addEventListener('click', () => openLoanModal());
  document.querySelectorAll('[data-edit-loan]').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = state.loans.find(x => x.id === parseInt(btn.dataset.editLoan));
      if (l) openLoanModal(l);
    });
  });
  document.querySelectorAll('[data-delete-loan]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.deleteLoan);
      if (!confirm('Remove this loan?')) return;
      state.loans = state.loans.filter(l => l.id !== id);
      saveLocal(); render();
      showToast('Loan removed', '#ef4444');
      withSync(() => sb.from('anna_loans').delete().eq('id', id));
    });
  });
}

/* ── Data refresh ── */
async function refreshMonth() {
  setSyncStatus('syncing');
  try {
    const remote = await fetchMonth(state.currentYear, state.currentMonth);
    state.salary   = remote.salary;
    state.expenses = remote.expenses;
    state.loans    = remote.loans;
    saveLocal();
    setSyncStatus('synced');
  } catch(e) {
    console.error(e);
    setSyncStatus('error');
    showToast('Could not load month data', '#f97316');
  }
  render();
}

async function refreshYearData() {
  setSyncStatus('syncing');
  try {
    state.yearData = await fetchYearData(state.currentYear);
    setSyncStatus('synced');
  } catch(e) {
    console.error(e);
    setSyncStatus('error');
    state.yearData = Array(12).fill(0);
  }
  render();
}

/* ── Modals ── */
function openExpenseModal(expense = null) {
  const isEdit = !!expense;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? 'Edit Expense' : `New Expense — ${MONTHS[state.currentMonth]}`}</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input id="m-name" type="text" value="${isEdit ? expense.name : ''}" placeholder="e.g. Rent" />
        </div>
        <div class="form-group">
          <label>Amount (€)</label>
          <input id="m-amount" type="number" step="0.01" min="0" value="${isEdit ? expense.amount : ''}" placeholder="0.00" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="m-cat">
            ${CATEGORIES.map(c => `<option value="${c}" ${isEdit && expense.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <input id="m-note" type="text" value="${isEdit ? (expense.note||'') : ''}" placeholder="Details…" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">${isEdit ? 'Save' : 'Add'}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.querySelector('#m-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#m-save').addEventListener('click', async () => {
    const name   = overlay.querySelector('#m-name').value.trim();
    const amount = parseFloat(overlay.querySelector('#m-amount').value);
    const cat    = overlay.querySelector('#m-cat').value;
    const note   = overlay.querySelector('#m-note').value.trim();

    if (!name || isNaN(amount) || amount < 0) { alert('Please enter a valid name and amount.'); return; }

    const saveBtn = overlay.querySelector('#m-save');
    saveBtn.disabled = true; saveBtn.textContent = '…';

    if (isEdit) {
      const base = state.expenses.find(e => e.id === expense.id);
      if (base) { base.name = name; base.amount = amount; base.category = cat; base.note = note; }
      saveLocal(); overlay.remove(); render();
      showToast('Expense updated');
      withSync(() => sb.from('anna_expenses').update({ name, amount, category: cat, note }).eq('id', expense.id));
    } else {
      try {
        setSyncStatus('syncing');
        const { data, error } = await sb.from('anna_expenses')
          .insert({ name, category: cat, amount, note, year: state.currentYear, month: state.currentMonth })
          .select().single();
        if (error) throw error;
        state.expenses.push(data);
        saveLocal(); overlay.remove(); render();
        showToast('Expense added');
        setSyncStatus('synced');
      } catch(e) {
        console.error(e); setSyncStatus('error');
        saveBtn.disabled = false; saveBtn.textContent = 'Add';
        showToast('Could not save — check connection', '#ef4444');
      }
    }
  });

  overlay.querySelector('#m-name')?.focus();
}

function openSalaryModal() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Set Net Salary</h3>
      <div class="form-group">
        <label>Monthly Net Salary (€)</label>
        <input id="s-amount" type="number" step="0.01" min="0" value="${state.salary || ''}" placeholder="0.00" />
      </div>
      <div class="modal-actions">

        <button class="btn btn-primary" id="s-save">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

    saveLocal(); overlay.remove(); render();
    showToast('Salary updated');

  });
  overlay.querySelector('#s-amount').select();
}

/* ── Boot ── */
async function init() {
  const cached = loadLocal();
  if (cached) {
    state = { ...state, ...cached, activeTab: 'monthly', yearData: null };
    render();
  }
  try {
    const remote = await fetchMonth(state.currentYear, state.currentMonth);
    state.salary   = remote.salary;
    state.expenses = remote.expenses;
    state.loans    = remote.loans;
    saveLocal();
    setSyncStatus('synced');
  } catch(e) {
    console.error(e);
    setSyncStatus('error');
    showToast('Could not reach database', '#f97316');
  }
  render();
}

/* ── Lock screen ── */
const PIN = '1993';

function showLock() {
  let entered = '';

  const el = document.createElement('div');
  el.id = 'lock-screen';
  el.innerHTML = `
    <div class="lock-icon">€</div>
    <div class="lock-title">ANNA</div>
    <div class="lock-sub">Enter PIN to continue</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k => `
        <button class="key-btn ${k==='' ? 'empty' : k==='⌫' ? 'del' : ''}"
          data-key="${k}">${k}</button>`).join('')}
    </div>`;
  document.body.appendChild(el);

  function updateDots() {
    document.querySelectorAll('.pin-dot').forEach((d, i) => {
      d.classList.toggle('filled', i < entered.length);
    });
  }

  function wrong() {
    const err = document.getElementById('pin-error');
    err.textContent = 'Incorrect PIN';
    el.style.animation = 'shake .35s';
    setTimeout(() => { el.style.animation = ''; err.textContent = ''; }, 700);
    entered = '';
    updateDots();
  }

  el.addEventListener('click', e => {
    const btn = e.target.closest('.key-btn');
    if (!btn || btn.classList.contains('empty')) return;
    const k = btn.dataset.key;
    if (k === '⌫') {
      entered = entered.slice(0, -1);
    } else if (entered.length < 4) {
      entered += k;
      if (entered.length === 4) {
        if (entered === PIN) {
          sessionStorage.setItem('anna_ok', '1');
          el.remove();
          init();
        } else {
          wrong();
        }
        return;
      }
    }
    updateDots();
    document.getElementById('pin-error').textContent = '';
  });
}

// Add shake keyframe
const ks = document.createElement('style');
ks.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-10px)} 40%,80%{transform:translateX(10px)} }`;
document.head.appendChild(ks);

// Start
if (sessionStorage.getItem('anna_ok') === '1') {
  init();
} else {
  showLock();
}
</script>

<!-- Service worker + install prompt (non-module, runs globally) -->
<script>
  // Register service worker (enables PWA install on Chrome/Edge Mac & Windows)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  // Capture install prompt (Chrome/Edge only — Safari handles it via Share menu)
  window._installReady  = false;
  window._installPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    window._installPrompt = e;
    window._installReady  = true;
    const btn = document.getElementById('install-btn');
    if (btn) btn.classList.add('visible');
  });

  window.addEventListener('appinstalled', () => {
    window._installReady  = false;
    window._installPrompt = null;
    const btn = document.getElementById('install-btn');
    if (btn) btn.classList.remove('visible');
  });
</script>
